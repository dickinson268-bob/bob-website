<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Racing Tips</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1a5c2a;
    --green-mid: #236b33;
    --green-light: #2e8b47;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --cream: #f5f0e8;
    --dark: #0d1a10;
    --text-light: #e8f0ea;
    --text-muted: #9eb8a2;
    --red: #c0392b;
    --white: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: transparent;
    font-family: 'Barlow', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .widget {
    width: 100%;
    max-width: 480px;
    background: var(--dark);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(201,168,76,0.2);
    position: relative;
  }

  /* Subtle grass texture overlay */
  .widget::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: 
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(255,255,255,0.007) 3px,
        rgba(255,255,255,0.007) 6px
      );
    pointer-events: none;
    z-index: 0;
  }

  .widget > * { position: relative; z-index: 1; }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, var(--green) 0%, var(--green-mid) 60%, #1d4a28 100%);
    padding: 18px 20px 14px;
    border-bottom: 2px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .trophy-icon {
    width: 36px;
    height: 36px;
    background: var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(201,168,76,0.4);
  }

  .header-titles {}

  .header-titles h1 {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 900;
    color: var(--gold-light);
    letter-spacing: 0.02em;
    line-height: 1.1;
    text-transform: uppercase;
  }

  .header-titles p {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .date-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--green);
    background: var(--gold);
    padding: 4px 8px;
    border-radius: 2px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── Tips list ── */
  .tips-container {
    padding: 0;
  }

  .tip-card {
    padding: 16px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    position: relative;
  }

  .tip-card.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .tip-card:last-child { border-bottom: none; }

  .tip-card:hover {
    background: rgba(255,255,255,0.025);
  }

  .tip-number {
    position: absolute;
    top: 16px;
    left: 20px;
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 900;
    color: rgba(201,168,76,0.08);
    line-height: 1;
    user-select: none;
  }

  .tip-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    padding-left: 0;
  }

  .meeting-tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    background: rgba(201,168,76,0.12);
    border: 1px solid rgba(201,168,76,0.25);
    padding: 2px 7px;
    border-radius: 2px;
  }

  .time-tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 2px 7px;
    border-radius: 2px;
  }

  .confidence-pip {
    margin-left: auto;
    display: flex;
    gap: 3px;
    align-items: center;
  }

  .confidence-pip span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(201,168,76,0.2);
    border: 1px solid rgba(201,168,76,0.3);
  }

  .confidence-pip span.active {
    background: var(--gold);
    border-color: var(--gold);
  }

  .horse-name {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: 0.01em;
    line-height: 1.1;
    margin-bottom: 6px;
  }

  .tip-reason {
    font-family: 'Barlow', sans-serif;
    font-size: 12.5px;
    font-weight: 300;
    color: var(--text-muted);
    line-height: 1.55;
  }

  /* ── Loading state ── */
  .loading-state {
    padding: 32px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid rgba(201,168,76,0.15);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-transform: uppercase;
    text-align: center;
  }

  .loading-dots::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }

  @keyframes dots {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
    100% { content: ''; }
  }

  /* ── Error state ── */
  .error-state {
    padding: 24px 20px;
    text-align: center;
  }

  .error-icon { font-size: 24px; margin-bottom: 8px; }

  .error-text {
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  /* ── Footer ── */
  .footer {
    background: rgba(0,0,0,0.3);
    border-top: 1px solid rgba(255,255,255,0.06);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .footer-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
  }

  .refresh-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    background: none;
    border: 1px solid rgba(201,168,76,0.3);
    padding: 4px 10px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .refresh-btn:hover {
    background: rgba(201,168,76,0.1);
    border-color: var(--gold);
  }

  .refresh-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Divider between tips */
  .tip-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.15), transparent);
    margin: 0 20px;
  }
</style>
</head>
<body>

<div class="widget" id="racing-widget">
  <div class="header">
    <div class="header-left">
      <div class="trophy-icon">🏆</div>
      <div class="header-titles">
        <h1>Today's Racing Tips</h1>
        <p>AI-Powered UK Selections</p>
      </div>
    </div>
    <div class="date-badge" id="date-badge">—</div>
  </div>

  <div class="tips-container" id="tips-container">
    <div class="loading-state" id="loading-state">
      <div class="spinner"></div>
      <div class="loading-text loading-dots">Analysing today's UK racing</div>
    </div>
  </div>

  <div class="footer">
    <span class="footer-label">For entertainment only · 18+</span>
    <button class="refresh-btn" id="refresh-btn" onclick="fetchTips(true)">↻ Refresh</button>
  </div>
</div>

<script>
  // ── Config ──────────────────────────────────────────────────
  const CACHE_KEY    = 'racing_tips_v1';
  const REFRESH_HOUR = 10; // 10am daily refresh

  // ── Date helpers ─────────────────────────────────────────────
  function todayUKString() {
    return new Date().toLocaleDateString('en-GB', {
      timeZone: 'Europe/London',
      day:   '2-digit',
      month: '2-digit',
      year:  'numeric'
    });
  }

  function todayUKDisplay() {
    return new Date().toLocaleDateString('en-GB', {
      timeZone:  'Europe/London',
      weekday:   'short',
      day:       'numeric',
      month:     'short',
      year:      'numeric'
    });
  }

  function getUKHour() {
    return parseInt(new Date().toLocaleString('en-GB', {
      timeZone: 'Europe/London', hour: '2-digit', hour12: false
    }));
  }

  // ── Cache helpers ─────────────────────────────────────────────
  function loadCache() {
    try { return JSON.parse(localStorage.getItem(CACHE_KEY)); } catch { return null; }
  }

  function saveCache(data) {
    localStorage.setItem(CACHE_KEY, JSON.stringify({
      date: todayUKString(),
      hour: getUKHour(),
      tips: data
    }));
  }

  function isCacheValid(cache) {
    if (!cache || cache.date !== todayUKString()) return false;
    // If current time is past 10am and cache was saved before 10am, force refresh
    const now = getUKHour();
    if (now >= REFRESH_HOUR && cache.hour < REFRESH_HOUR) return false;
    return true;
  }

  // ── AI fetch ──────────────────────────────────────────────────
  async function fetchFromAI() {
    const today = new Date().toLocaleDateString('en-GB', {
      timeZone: 'Europe/London',
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
    });

    const prompt = `Today is ${today}. You are an expert UK horse racing tipster.

Using your knowledge of UK racing — including horse form, trainer and jockey performance, owner records, course conditions, race class, draw bias, and strength of field — select exactly 3 of today's best UK horse racing tips.

Respond ONLY with a valid JSON array (no markdown, no explanation). Format:
[
  {
    "horse": "Horse Name",
    "meeting": "Racecourse Name",
    "time": "HH:MM",
    "confidence": 3,
    "reason": "Two or three sentences explaining why this horse is well fancied today, covering form, trainer, conditions, or any notable edge."
  }
]

confidence is an integer 1–3 (3 = highest). Spread tips across different meetings where possible. Be specific and authoritative.`;

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    if (!response.ok) throw new Error(data.error?.message || 'API error');

    // Extract text content from response (may include tool_use blocks)
    const textBlocks = (data.content || [])
      .filter(b => b.type === 'text')
      .map(b => b.text)
      .join('\n');

    // Parse JSON, stripping any accidental fences
    const clean = textBlocks.replace(/```json|```/g, '').trim();
    const match = clean.match(/\[[\s\S]*\]/);
    if (!match) throw new Error('No JSON array in response');
    return JSON.parse(match[0]);
  }

  // ── Render ────────────────────────────────────────────────────
  function renderTips(tips) {
    document.getElementById('date-badge').textContent = todayUKDisplay();

    const container = document.getElementById('tips-container');
    container.innerHTML = '';

    tips.forEach((tip, i) => {
      // Divider between cards (not before first)
      if (i > 0) {
        const div = document.createElement('div');
        div.className = 'tip-divider';
        container.appendChild(div);
      }

      const card = document.createElement('div');
      card.className = 'tip-card';
      card.innerHTML = `
        <div class="tip-number">${i + 1}</div>
        <div class="tip-meta">
          <span class="meeting-tag">${escHtml(tip.meeting)}</span>
          <span class="time-tag">⏱ ${escHtml(tip.time)}</span>
          <div class="confidence-pip">
            ${[1,2,3].map(n => `<span class="${n <= tip.confidence ? 'active' : ''}"></span>`).join('')}
          </div>
        </div>
        <div class="horse-name">${escHtml(tip.horse)}</div>
        <div class="tip-reason">${escHtml(tip.reason)}</div>
      `;
      container.appendChild(card);

      // Staggered entrance
      setTimeout(() => card.classList.add('visible'), 80 * i);
    });
  }

  function renderError(msg) {
    document.getElementById('date-badge').textContent = todayUKDisplay();
    document.getElementById('tips-container').innerHTML = `
      <div class="error-state">
        <div class="error-icon">🏇</div>
        <div class="error-text">${escHtml(msg)}<br><br>Please try refreshing the widget.</div>
      </div>`;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Main ──────────────────────────────────────────────────────
  async function fetchTips(forceRefresh = false) {
    const btn = document.getElementById('refresh-btn');
    btn.disabled = true;

    // Show loading
    document.getElementById('tips-container').innerHTML = `
      <div class="loading-state">
        <div class="spinner"></div>
        <div class="loading-text loading-dots">Analysing today's UK racing</div>
      </div>`;

    // Check cache unless forced
    if (!forceRefresh) {
      const cache = loadCache();
      if (isCacheValid(cache)) {
        renderTips(cache.tips);
        btn.disabled = false;
        return;
      }
    }

    try {
      const tips = await fetchFromAI();
      saveCache(tips);
      renderTips(tips);
    } catch (err) {
      console.error('Racing tips error:', err);
      renderError('Unable to retrieve tips right now.');
    } finally {
      btn.disabled = false;
    }
  }

  // ── Schedule daily 10am refresh ───────────────────────────────
  function scheduleDailyRefresh() {
    const now   = new Date();
    const next  = new Date(now);
    next.setHours(10, 0, 5, 0); // 10:00:05 to avoid edge cases
    if (now >= next) next.setDate(next.getDate() + 1);
    const msUntil = next - now;
    setTimeout(() => {
      fetchTips(true);
      setInterval(() => fetchTips(true), 24 * 60 * 60 * 1000);
    }, msUntil);
  }

  // ── Init ──────────────────────────────────────────────────────
  document.getElementById('date-badge').textContent = todayUKDisplay();
  fetchTips();
  scheduleDailyRefresh();
</script>
</body>
</html>
